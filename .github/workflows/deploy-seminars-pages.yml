name: Deploy engineering seminars to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "ai-agent-harness-seminar/**"
      - ".github/pages/**"
      - ".github/workflows/deploy-seminars-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ai-agent-harness-seminar/package-lock.json

      - name: Install seminar dependencies
        working-directory: ai-agent-harness-seminar
        run: npm ci

      - name: Validate seminar project
        working-directory: ai-agent-harness-seminar
        run: npm run validate

      - name: Build Pages staging directory
        working-directory: ai-agent-harness-seminar
        env:
          PAGES_BASE_PATH: /${{ github.event.repository.name }}/ai-agent-harness-seminar/
        run: npm run build:pages

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _pages

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
